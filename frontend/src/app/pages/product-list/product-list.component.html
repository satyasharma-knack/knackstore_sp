<div class="container py-4">
  <div class="row g-4">
    <!-- Sidebar Filters -->
    <div class="col-md-3">
      <div class="card shadow-sm">
        <div class="card-header bg-dark text-white fw-bold">Filters</div>
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">Category</label>
            <select class="form-select form-select-sm" [(ngModel)]="filters.category" (change)="applyFilters()">
              <option value="">All Categories</option>
              <option *ngFor="let cat of categories" [value]="cat.code">{{ cat.name }}</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Brand</label>
            <select class="form-select form-select-sm" [(ngModel)]="filters.brand" (change)="applyFilters()">
              <option value="">All Brands</option>
              <option *ngFor="let brand of brands" [value]="brand">{{ brand }}</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Min Price ($)</label>
            <input type="number" class="form-control form-control-sm" [(ngModel)]="filters.minPrice" placeholder="0">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Max Price ($)</label>
            <input type="number" class="form-control form-control-sm" [(ngModel)]="filters.maxPrice" placeholder="5000">
          </div>
          <div class="d-grid gap-2">
            <button class="btn btn-primary btn-sm" (click)="applyFilters()">Apply Filters</button>
            <button class="btn btn-outline-secondary btn-sm" (click)="clearFilters()">Clear All</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Product Grid -->
    <div class="col-md-9">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0 fw-bold">{{ activeCategory }}</h4>
        <span class="text-muted small">{{ products.length }} products found</span>
      </div>
      <div *ngIf="loading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>
      <div *ngIf="!loading && products.length === 0" class="text-center py-5">
        <p class="text-muted fs-5">No products found. Try adjusting your filters.</p>
        <button class="btn btn-outline-primary" (click)="clearFilters()">Clear Filters</button>
      </div>
      <div class="row g-4">
        <div *ngFor="let product of products" class="col-sm-6 col-lg-4">
          <app-product-card [product]="product"></app-product-card>
        </div>
      </div>
    </div>
  </div>
</div>
