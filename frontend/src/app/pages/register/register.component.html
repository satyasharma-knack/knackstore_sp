<div class="container py-5 d-flex justify-content-center">
  <div class="card shadow-sm w-100" style="max-width:480px">
    <div class="card-body p-4">
      <h3 class="fw-bold mb-1">Create an Account</h3>
      <p class="text-muted mb-4">Start shopping in seconds</p>
      <div *ngIf="error" class="alert alert-danger py-2 small">{{ error }}</div>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="row g-3">
          <div class="col-6"><label class="form-label">First Name *</label><input class="form-control" formControlName="firstName"><div *ngIf="form.get('firstName')?.invalid && form.get('firstName')?.touched" class="text-danger small">Required</div></div>
          <div class="col-6"><label class="form-label">Last Name *</label><input class="form-control" formControlName="lastName"></div>
          <div class="col-12"><label class="form-label">Email *</label><input class="form-control" formControlName="email" placeholder="you@example.com"></div>
          <div class="col-12"><label class="form-label">Password *</label><input class="form-control" type="password" formControlName="password"><div *ngIf="form.get('password')?.invalid && form.get('password')?.touched" class="text-danger small">Min 8 characters</div></div>
          <div class="col-12"><label class="form-label">Phone</label><input class="form-control" formControlName="phone"></div>
        </div>
        <button class="btn btn-primary w-100 mt-4" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>Create Account
        </button>
      </form>
      <p class="text-center mt-3 mb-0 text-muted small">Already have an account? <a routerLink="/login">Sign in</a></p>
    </div>
  </div>
</div>
