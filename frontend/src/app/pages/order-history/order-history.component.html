<div class="container py-4">
  <h2 class="fw-bold mb-4">My Orders</h2>
  <div *ngIf="loading" class="text-center py-5"><div class="spinner-border text-primary"></div></div>
  <div *ngIf="!loading && orders.length === 0" class="text-center py-5">
    <p class="text-muted fs-5">You haven't placed any orders yet.</p>
    <a routerLink="/products" class="btn btn-primary">Start Shopping</a>
  </div>
  <div *ngFor="let order of orders" class="card shadow-sm mb-3">
    <div class="card-body">
      <div class="row align-items-center">
        <div class="col-md-3"><small class="text-muted">Order Code</small><div class="fw-bold">{{ order.orderCode }}</div></div>
        <div class="col-md-2"><small class="text-muted">Date</small><div>{{ order.placedDate | date:'dd MMM yyyy' }}</div></div>
        <div class="col-md-2"><small class="text-muted">Items</small><div>{{ order.entries?.length }}</div></div>
        <div class="col-md-2"><small class="text-muted">Total</small><div class="fw-bold text-primary">{{ order.totalPrice | currency:'USD' }}</div></div>
        <div class="col-md-2"><span class="badge" [class]="getStatusClass(order.status)">{{ order.status }}</span></div>
        <div class="col-md-1 text-end"><a [routerLink]="['/account/orders', order.orderCode]" class="btn btn-sm btn-outline-primary">View</a></div>
      </div>
    </div>
  </div>
</div>
