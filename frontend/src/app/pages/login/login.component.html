<div class="container py-5 d-flex justify-content-center">
  <div class="card shadow-sm w-100" style="max-width:420px">
    <div class="card-body p-4">
      <h3 class="fw-bold mb-1">Welcome back</h3>
      <p class="text-muted mb-4">Sign in to your account</p>
      <div *ngIf="error" class="alert alert-danger py-2 small">{{ error }}</div>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <div class="mb-3"><label class="form-label">Email</label><input class="form-control" formControlName="email" placeholder="you@example.com"></div>
        <div class="mb-4"><label class="form-label">Password</label><input class="form-control" type="password" formControlName="password" placeholder="••••••••"></div>
        <button class="btn btn-primary w-100" [disabled]="loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>Sign In
        </button>
      </form>
      <p class="text-center mt-3 mb-0 text-muted small">
        No account? <a routerLink="/register">Register here</a>
      </p>
      <p class="text-center mt-2 text-muted small">Demo: <strong>demo&#64;knack.com</strong> / <strong>Demo&#64;1234</strong></p>
    </div>
  </div>
</div>
